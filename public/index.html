<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - StreamX</title>
  <style>
    body {
      background: #181c20;
      color: #e0e6ed;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .signup-box {
      background: #23272f;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      padding: 2em 2.5em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5em;
      min-width: 320px;
    }
    .branding {
      font-size: 2em;
      font-weight: bold;
      color: #4fd1c5;
      letter-spacing: 2px;
      margin-bottom: 0.5em;
    }
    .google-btn {
      background: #fff;
      color: #181c20;
      border: none;
      border-radius: 6px;
      padding: 0.7em 2em;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.7em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      transition: background 0.2s;
    }
    .google-btn img {
      width: 24px;
      height: 24px;
    }
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;
    }
    .profile img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #4fd1c5;
      margin-bottom: 0.3em;
    }
    .continue-btn {
      background: #4fd1c5;
      color: #181c20;
      border: none;
      border-radius: 6px;
      padding: 0.6em 2em;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1em;
    }
    .status {
      color: #4fd1c5;
      font-size: 1em;
      min-height: 1.5em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="signup-box">
    <div class="branding">StreamX</div>
    <button class="google-btn" id="googleBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Continue with Google
    </button>
    <div class="profile" id="profile" style="display:none;">
      <img id="profilePic" src="" alt="Profile Picture" />
      <div id="displayName"></div>
    </div>
    <button class="continue-btn" id="continueBtn" style="display:none;">Continue to App</button>
    <div class="status" id="status"></div>
  </div>
  <script type="module" src="../src/signup.js"></script>
</body>
</html>
